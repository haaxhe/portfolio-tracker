name: security

on:
  push:
  pull_request:

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pip-audit

      - name: Run API and auth regression tests
        run: python -m unittest discover -s tests

      - name: Audit Python dependencies
        run: python -m pip_audit -r requirements.txt

      - name: Install frontend dependencies
        run: npm ci

      - name: Audit frontend dependencies
        run: npm audit --audit-level=high

      - name: Build frontend bundle
        run: npm run build

      - name: Scan for committed secrets
        run: |
          python - <<'PY'
          import pathlib
          import re
          import subprocess
          import sys

          patterns = [
              re.compile(r"sk-[A-Za-z0-9_-]{20,}"),
              re.compile(r"SUPABASE_SERVICE_ROLE[_A-Z]*\\s*=\\s*\\S+"),
              re.compile(r"ALPACA_SECRET_KEY\\s*=\\s*\\S+"),
              re.compile(r"RH_PASSWORD\\s*=\\s*\\S+"),
              re.compile(r"ETRADE_CONSUMER_SECRET\\s*=\\s*\\S+"),
              re.compile(r"-----BEGIN (?:RSA |EC |OPENSSH )?PRIVATE KEY-----"),
          ]
          ignored_dirs = {".git", ".github", ".yfinance-cache", "node_modules", "venv", "frontend/dist"}
          ignored_files = {".env.example"}
          findings = []

          tracked = subprocess.check_output(["git", "ls-files"], text=True).splitlines()
          for name in tracked:
              path = pathlib.Path(name)
              if not path.is_file():
                  continue
              if any(part in ignored_dirs for part in path.parts):
                  continue
              if path.name in ignored_files:
                  continue
              if path.suffix.lower() in {".md", ".example"}:
                  continue
              try:
                  text = path.read_text(encoding="utf-8")
              except UnicodeDecodeError:
                  continue
              for line_no, line in enumerate(text.splitlines(), start=1):
                  if any(pattern.search(line) for pattern in patterns):
                      findings.append(f"{path}:{line_no}")

          if findings:
              print("Potential committed secrets found:")
              print("\\n".join(findings))
              sys.exit(1)
          PY
